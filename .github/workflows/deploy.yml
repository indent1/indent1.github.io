name: Auto Publish and Deploy

on:
push:
branches:
- main
- master
workflow_dispatch:

permissions:
contents: write
pages: write
id-token: write

concurrency:
group: pages
cancel-in-progress: false

defaults:
run:
shell: bash

jobs:
build_and_deploy:
runs-on: ubuntu-latest
env:
DART_SASS_VERSION: 1.97.1
GO_VERSION: 1.25.5
HUGO_VERSION: 0.154.2
NODE_VERSION: 24.12.0
TZ: Asia/Shanghai
DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}

```
steps:
  # 1. 拉取代码
  - name: Checkout
    uses: actions/checkout@v6
    with:
      submodules: recursive
      fetch-depth: 0

  # 2. 配置 Python 环境
  - name: Setup Python
    uses: actions/setup-python@v5
    with:
      python-version: '3.10'

  # 3. 安装 Python 依赖库
  # 这里多装一点，保证 auto_post.py / highest.py / meigu_web1.py 都能跑
  - name: Install Python dependencies
    run: |
      python -m pip install --upgrade pip
      pip install requests pandas akshare beautifulsoup4 lxml yfinance matplotlib mplfinance

  # 4. 运行 Python 脚本
  # 三个脚本都会尝试运行；如果其中一个失败，最后让 Actions 变红，方便看日志定位
  - name: Run Python AI Scripts
    run: |
      echo "Preparing output folders..."
      mkdir -p content/post
      mkdir -p stock_cache
      mkdir -p static/images

      failed=0

      run_script() {
        script="$1"
        label="$2"

        echo ""
        echo "$label"

        if [ ! -f "$script" ]; then
          echo "::error file=$script::$script not found"
          failed=1
          return
        fi

        if python -u "$script"; then
          echo "✅ $script finished"
        else
          echo "::error file=$script::$script failed"
          failed=1
        fi
      }

      run_script "auto_post.py" "1. Running auto_post.py..."
      run_script "highest.py" "2. Running highest.py..."
      run_script "meigu_web1.py" "3. Running meigu_web1.py..."

      if [ "$failed" -ne 0 ]; then
        echo ""
        echo "❌ One or more Python scripts failed. Please check the log above."
        exit 1
      fi

      echo ""
      echo "✅ All Python scripts finished successfully."

  # 5. 配置机器人的 Git 账号
  - name: Configure Git
    run: |
      git config core.quotepath false
      git config user.name "github-actions[bot]"
      git config user.email "github-actions[bot]@users.noreply.github.com"

  # 6. 把生成的文章、缓存和图片保存到仓库
  - name: Commit all generated reports and cache
    run: |
      rm -rf /tmp/all_generated
      mkdir -p /tmp/all_generated/post
      mkdir -p /tmp/all_generated/stock_cache
      mkdir -p /tmp/all_generated/static/images

      if [ -d "content/post" ]; then
        cp -a content/post/. /tmp/all_generated/post/ 2>/dev/null || true
      fi

      if [ -d "stock_cache" ]; then
        cp -a stock_cache/. /tmp/all_generated/stock_cache/ 2>/dev/null || true
      fi

      if [ -d "static/images" ]; then
        cp -a static/images/. /tmp/all_generated/static/images/ 2>/dev/null || true
      fi

      echo "Syncing latest remote branch..."
      git fetch origin "${GITHUB_REF_NAME}"
      git reset --hard "origin/${GITHUB_REF_NAME}"

      mkdir -p content/post
      mkdir -p stock_cache
      mkdir -p static/images

      cp -a /tmp/all_generated/post/. content/post/ 2>/dev/null || true
      cp -a /tmp/all_generated/stock_cache/. stock_cache/ 2>/dev/null || true
      cp -a /tmp/all_generated/static/images/. static/images/ 2>/dev/null || true

      if [ -n "$(git status --porcelain -- content/post stock_cache static/images)" ]; then
        git add content/post stock_cache static/images
        git commit -m "🤖 AI 自动更新今日量化复盘报告 [skip ci]"
        git push origin "HEAD:${GITHUB_REF_NAME}"
      else
        echo "没有检测到新文章、缓存或图片，跳过提交。"
      fi

  # 7. 配置建站环境
  - name: Setup Go
    uses: actions/setup-go@v6
    with:
      go-version: ${{ env.GO_VERSION }}
      cache: false

  - name: Setup Node.js
    uses: actions/setup-node@v6
    with:
      node-version: ${{ env.NODE_VERSION }}

  - name: Setup Pages
    id: pages
    uses: actions/configure-pages@v6

  - name: Install Dart Sass
    run: |
      mkdir -p "${HOME}/.local"
      curl -sLJO "https://github.com/sass/dart-sass/releases/download/${DART_SASS_VERSION}/dart-sass-${DART_SASS_VERSION}-linux-x64.tar.gz"
      tar -C "${HOME}/.local" -xf "dart-sass-${DART_SASS_VERSION}-linux-x64.tar.gz"
      rm "dart-sass-${DART_SASS_VERSION}-linux-x64.tar.gz"
      echo "${HOME}/.local/dart-sass" >> "${GITHUB_PATH}"

  - name: Setup Hugo
    uses: peaceiris/actions-hugo@v3
    with:
      hugo-version: 'latest'
      extended: true

  - name: Install Node.js dependencies
    run: |
      [[ -f package-lock.json || -f npm-shrinkwrap.json ]] && npm ci || true

  # 8. Hugo 构建网页
  - name: Cache restore
    id: cache-restore
    uses: actions/cache/restore@v5
    with:
      path: ${{ runner.temp }}/hugo_cache
      key: hugo-${{ github.run_id }}
      restore-keys: hugo-

  - name: Build the site
    run: |
      hugo \
        --gc \
        --minify \
        --baseURL "${{ steps.pages.outputs.base_url }}/" \
        --cacheDir "${{ runner.temp }}/hugo_cache"

  - name: Cache save
    id: cache-save
    uses: actions/cache/save@v5
    with:
      path: ${{ runner.temp }}/hugo_cache
      key: ${{ steps.cache-restore.outputs.cache-primary-key }}

  - name: Upload artifact
    uses: actions/upload-pages-artifact@v5
    with:
      path: ./public
```

# 9. 发布到 GitHub Pages

deploy:
environment:
name: github-pages
url: ${{ steps.deployment.outputs.page_url }}
runs-on: ubuntu-latest
needs: build_and_deploy
steps:
- name: Deploy to GitHub Pages
id: deployment
uses: actions/deploy-pages@v5
