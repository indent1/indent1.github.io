name: 发布博客

on:
  workflow_dispatch: 
  schedule:
    # 每天下午 15:30 自动执行 (北京时间) -> UTC 07:30
    - cron: '30 7 * * 1-5'

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: write  # 授予机器人写文件的权限

    steps:
    - name: Checkout codes
      uses: actions/checkout@v3

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'

    - name: Install libraries
      run: |
        python -m pip install --upgrade pip
        pip install requests pandas akshare

    - name: Run AI Script (生成 Markdown 文章)
      env:
        DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
      run: |
        python auto_post.py

    - name: Commit and Push (机器人自动把文章发布到网站)
      run: |
        # 配置机器人的身份
        git config user.name "github-actions[bot]"
        git config user.email "github-actions[bot]@users.noreply.github.com"
        
        # 把刚才生成的文章添加到仓库
        git add content/post/*
        
        # 提交并推送到你的仓库
        # 加上 || echo "No changes to commit" 是防止今天没写文章导致报错
        git commit -m "🤖 AI 自动发布今日量化复盘报告" || echo "No changes to commit"
        git push
